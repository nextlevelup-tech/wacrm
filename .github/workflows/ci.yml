name: CI

on:
  push:
    branches: ['**']

permissions:
  contents: read
  packages: write

# Cancel older CI runs for the same branch when a new commit arrives —
# saves minutes when someone pushes a stack of fixes to one PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    # Dummy env vars so `next build` doesn't fail when it reads the
    # public Supabase config at build time. These never leave CI and
    # never hit a real service — they just satisfy the `!` non-null
    # assertions in the client factories. ENCRYPTION_KEY and
    # META_APP_SECRET are read at module-load by lib/whatsapp/*; the
    # test suite asserts behaviour around these values, so any non-
    # empty placeholder works as long as it stays consistent with
    # vitest.config.ts.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Prepare image tag
        id: image_tag
        run: |
          SAFE_BRANCH="$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#^-##; s#-$##')"
          DATE="$(date -u +'%Y.%m.%d-%H%M')"
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY%%/*}/wacrm" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SAFE_BRANCH}-${DATE}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_tag.outputs.image_name }}:${{ steps.image_tag.outputs.image_tag }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            ENCRYPTION_KEY=${{ env.ENCRYPTION_KEY }}
            META_APP_SECRET=${{ env.META_APP_SECRET }}
