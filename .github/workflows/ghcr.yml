name: Build and Push Docker Image

on:
  push:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Prepare image tag
        id: image_tag
        run: |
          SAFE_BRANCH="$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#^-##; s#-$##')"
          DATE="$(date -u +'%Y.%m.%d-%H%M')"
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY%%/*}/wacrm" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SAFE_BRANCH}-${DATE}" >> "$GITHUB_OUTPUT"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build e Push da imagem
        uses: docker/build-push-action@v6
        with:
            context: .
            push: true
            tags: ${{ steps.image_tag.outputs.image_name }}:${{ steps.image_tag.outputs.image_tag }}
            build-args: |
                NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                tags: ${{ steps.meta.outputs.tags }}